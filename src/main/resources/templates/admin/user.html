<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity - 유저 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<nav class="navbar">
    <div class="nav-logo"><a th:href="@{/admin}">🪐 Gravity 관리자</a></div>
    <div class="nav-menu">
        <a th:href="@{/admin}" class="nav-link">← 목록</a>
        <a th:href="@{/dashboard}" class="nav-link">🌌 대시보드</a>
        <a th:href="@{/auth/logout}" class="nav-link logout">로그아웃</a>
    </div>
</nav>

<div class="page-container">
    <div class="user-info-card">
        <div class="user-info-header">
            <div class="user-info-avatar" th:text="${user.gender == 'MALE' ? '♂' : '♀'}"></div>
            <div>
                <h2 th:text="${user.name}">이름</h2>
                <p class="user-info-sub" th:text="'@' + ${user.username}">@아이디</p>
            </div>
            <div class="user-info-meta">
                <span th:text="${user.zodiac + '띠'}">-</span>
                <span th:text="${user.birthDate}">-</span>
                <span th:text="${user.createdAt != null ? '가입: ' + #temporals.format(user.createdAt, 'yy.MM.dd') : ''}">-</span>
            </div>
        </div>
    </div>

    <div class="admin-section">
        <h2 class="section-title">행성 연결 목록 <span class="count-badge" th:text="${connectionCount}">0</span></h2>

        <div th:if="${connections.empty}" class="empty-msg">연결된 행성이 없습니다.</div>

        <div class="admin-table-wrap" th:if="${!connections.empty}">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>파트너</th>
                        <th>끌림 지수</th>
                        <th>띠 점수</th>
                        <th>수비학</th>
                        <th>오행</th>
                        <th>분석일</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${connections}">
                        <td>
                            <span th:text="${c.partner.name}">-</span>
                            <span class="sub-text" th:text="'@' + ${c.partner.username}">-</span>
                        </td>
                        <td>
                            <div class="score-cell">
                                <span class="score-num" th:text="${c.score + '점'}">-</span>
                                <div class="score-bar-bg">
                                    <div class="score-bar-fill" th:style="'width:' + ${c.score} + '%'"></div>
                                </div>
                            </div>
                        </td>
                        <td th:text="${c.zodiacScore}">-</td>
                        <td th:text="${c.numerologyScore}">-</td>
                        <td th:text="${c.elementScore}">-</td>
                        <td th:text="${c.createdAt != null ? #temporals.format(c.createdAt, 'yy.MM.dd') : '-'}">-</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
