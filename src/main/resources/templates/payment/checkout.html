<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gravity - 결제</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/payment.css}">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-logo"><a th:href="@{/dashboard}">🪐 Gravity</a></div>
</nav>

<div class="page-container">
    <div class="payment-card">
        <div class="payment-header">
            <div class="payment-icon">💫</div>
            <h1>궤도 분석 결제</h1>
            <p>AI가 두 분의 끌림을 정밀 분석합니다</p>
        </div>

        <div class="couple-preview">
            <div class="couple-user">
                <div class="couple-avatar me">🌍</div>
                <div class="couple-name" th:text="${currentUser.name}">나</div>
                <div class="couple-sub" th:text="${currentUser.zodiac + '띠'}">띠</div>
            </div>
            <div class="couple-heart">♥</div>
            <div class="couple-user">
                <div class="couple-avatar partner">🪐</div>
                <div class="couple-name" th:text="${partner.name}">상대방</div>
                <div class="couple-sub" th:text="${partner.zodiac + '띠'}">띠</div>
            </div>
        </div>

        <div class="order-info">
            <div class="order-row">
                <span>상품명</span>
                <span th:text="${orderName}">궤도 분석</span>
            </div>
            <div class="order-row total">
                <span>결제 금액</span>
                <span class="price">990원</span>
            </div>
        </div>

        <div id="payment-widget"></div>

        <button id="payment-button" class="btn-pay" onclick="requestPayment()">
            💳 990원 결제하기
        </button>

        <p class="payment-notice">
            결제 후 AI가 두 분의 끌림을 분석하며, 결과는 대시보드에 바로 반영됩니다.
        </p>

        <div style="margin-top:12px; padding-top:16px; border-top:1px solid rgba(255,255,255,0.08); text-align:center;">
            <p style="color:#64748B; font-size:12px; margin-bottom:8px;">개발/테스트 환경</p>
            <a th:href="@{'/payment/test/' + ${partner.id}}"
               style="display:inline-block; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); color:#94A3B8; padding:10px 20px; border-radius:10px; font-size:13px; text-decoration:none;">
                🧪 결제 없이 테스트 등록
            </a>
        </div>

        <a th:href="@{/search}" class="btn-back" style="margin-top:12px;">← 돌아가기</a>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay" style="display:none;">
    <div class="loading-content">
        <div class="loading-spinner"></div>
        <p>AI가 끌림을 분석 중입니다...</p>
        <p class="loading-sub">잠시만 기다려주세요 🌌</p>
    </div>
</div>

<!-- 토스페이먼츠 SDK -->
<script src="https://js.tosspayments.com/v1/payment"></script>
<script th:inline="javascript">
    const CLIENT_KEY = /*[[${clientKey}]]*/ '';
    const ORDER_ID = /*[[${orderId}]]*/ '';
    const ORDER_NAME = /*[[${orderName}]]*/ '';
    const PARTNER_ID = /*[[${partner.id}]]*/ 0;
    const AMOUNT = /*[[${amount}]]*/ 990;
    const CUSTOMER_NAME = /*[[${currentUser.name}]]*/ '';
</script>
<script th:src="@{/js/payment.js}"></script>
</body>
</html>
