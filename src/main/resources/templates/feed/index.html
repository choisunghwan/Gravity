<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gravity - 우주 피드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/feed.css}">
    <link rel="stylesheet" th:href="@{/css/notifications.css}">
    <link rel="stylesheet" href="/css/responsive.css">
    <link rel="stylesheet" href="/css/bottom-nav.css">
    <th:block th:replace="~{fragments/pwa :: pwa}"></th:block>
</head>
<body>
<nav class="navbar">
    <div class="nav-logo"><a th:href="@{/dashboard}">🪐 Gravity</a></div>
    <div class="nav-menu">
        <a th:href="@{/dashboard}" class="nav-link">🌌 대시보드</a>
        <a th:href="@{/feed}" class="nav-link active">📡 피드</a>
        <a th:href="@{/search}" class="nav-link">🔍 추가</a>
        <a th:href="@{/notifications}" class="nav-link notif-link">
            🔔
            <span th:if="${unreadNotifCount > 0}" class="notif-badge" th:text="${unreadNotifCount}"></span>
        </a>
        <a th:href="@{/mypage}" class="nav-link">👤</a>
        <a th:href="@{/auth/logout}" class="nav-link logout">로그아웃</a>
    </div>
</nav>

<div class="feed-container">

    <!-- 글 작성 -->
    <div class="post-write-card">
        <div class="post-write-header">
            <div class="post-avatar" th:style="'background:' + (${currentUser.planetColor} ?: '#4FC3F7')">
                <span th:text="${currentUser.planetEmoji ?: '🌍'}">🌍</span>
            </div>
            <div class="post-write-name" th:text="${currentUser.name}">나</div>
        </div>

        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

        <form th:action="@{/feed/post}" method="post" id="postForm">
            <textarea id="postContent" name="content" class="post-textarea"
                      placeholder="지금 우주에서 무슨 일이 일어나고 있나요? ✨"
                      maxlength="500" rows="3"></textarea>
            <div class="post-char-count"><span id="charCount">0</span> / 500</div>
            <div class="post-write-footer">
                <label class="public-toggle">
                    <input type="checkbox" name="isPublic" id="isPublicCheck">
                    <span class="toggle-track"></span>
                    <span class="toggle-label" id="toggleLabel">🔒 연결된 행성만</span>
                </label>
                <button type="submit" class="btn-post">신호 보내기 📡</button>
            </div>
        </form>
    </div>

    <!-- 피드 -->
    <div class="feed-list">

        <div th:if="${posts.empty}" class="feed-empty">
            <div class="feed-empty-icon">🌌</div>
            <p>아직 신호가 없어요.<br>첫 번째 신호를 보내보세요!</p>
        </div>

        <div th:each="post : ${posts}" class="post-card" th:data-post-id="${post.id}">
            <div class="post-header">
                <a th:href="@{'/planet/' + ${post.authorId}}" class="post-avatar-link">
                    <div class="post-avatar" th:style="'background:' + (${post.authorColor} ?: '#4FC3F7')">
                        <span th:text="${post.authorEmoji ?: '🌍'}">🌍</span>
                    </div>
                </a>
                <div class="post-meta">
                    <a th:href="@{'/planet/' + ${post.authorId}}" class="post-author-name"
                       th:text="${post.authorName}">이름</a>
                    <div class="post-time" th:text="${#temporals.format(post.createdAt, 'MM.dd HH:mm')}">시간</div>
                </div>
                <div class="post-badges">
                    <span th:if="${post.isPublic()}" class="badge-public">🌐 전체공개</span>
                    <span th:if="${!post.isPublic()}" class="badge-private">🔒 연결된 행성</span>
                </div>
            </div>
            <div class="post-content" th:text="${post.content}">내용</div>
            <div class="post-footer">
                <button class="btn-like" th:classappend="${post.likedByMe} ? ' liked' : ''"
                        th:data-id="${post.id}"
                        th:data-liked="${post.likedByMe}"
                        onclick="toggleLike(this)">
                    <span class="like-icon">🌟</span>
                    <span class="like-count" th:text="${post.likeCount}">0</span>
                </button>
                <div th:if="${post.authorId == currentUser.id}" class="post-my-actions">
                    <button class="btn-edit-post"
                            th:data-id="${post.id}"
                            th:data-content="${post.content}"
                            th:data-public="${post.isPublic()}"
                            onclick="openEditModalFromBtn(this)"
                            type="button">수정</button>
                    <form th:action="@{'/feed/delete/' + ${post.id}}" method="post" style="display:inline"
                          onsubmit="return confirm('이 신호를 삭제할까요?')">
                        <button type="submit" class="btn-delete-post">삭제</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- 수정 모달 -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;">
    <div style="background:#0F0F28;border:1px solid rgba(167,139,250,0.3);border-radius:20px;padding:28px 24px;max-width:520px;width:90%;box-sizing:border-box;">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;color:#E2E8F0;">✏️ 신호 수정</h3>
        <form id="editForm" method="post">
            <textarea id="editContent" name="content" class="post-textarea" rows="4" maxlength="500"></textarea>
            <div class="post-char-count"><span id="editCharCount">0</span> / 500</div>
            <div style="margin-top:12px;">
                <label class="public-toggle" style="margin-bottom:12px;display:flex;">
                    <input type="checkbox" name="isPublic" id="editIsPublic">
                    <span class="toggle-track"></span>
                    <span class="toggle-label" id="editToggleLabel">🔒 연결된 행성만</span>
                </label>
                <div style="display:flex;gap:8px;">
                    <button type="button" onclick="closeEditModal()"
                            style="flex:1;white-space:nowrap;background:rgba(255,255,255,0.08);border:none;border-radius:10px;padding:10px 0;color:#94A3B8;font-family:inherit;cursor:pointer;font-size:14px;">취소</button>
                    <button type="submit" class="btn-post" style="flex:2;margin:0;">저장</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    const textarea = document.getElementById('postContent');
    const charCount = document.getElementById('charCount');
    textarea.addEventListener('input', () => {
        charCount.textContent = textarea.value.length;
    });

    const isPublicCheck = document.getElementById('isPublicCheck');
    const toggleLabel = document.getElementById('toggleLabel');
    isPublicCheck.addEventListener('change', () => {
        toggleLabel.textContent = isPublicCheck.checked ? '🌐 전체 공개' : '🔒 연결된 행성만';
    });

    function openEditModalFromBtn(btn) {
        const id      = btn.dataset.id;
        const content = btn.dataset.content;
        const pub     = btn.dataset.public === 'true';
        openEditModal(id, content, pub);
    }

    function openEditModal(id, content, isPublic) {
        document.getElementById('editForm').action = '/feed/edit/' + id;
        document.getElementById('editContent').value = content;
        document.getElementById('editCharCount').textContent = content.length;
        const check = document.getElementById('editIsPublic');
        check.checked = isPublic;
        document.getElementById('editToggleLabel').textContent = isPublic ? '🌐 전체 공개' : '🔒 연결된 행성만';
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    document.getElementById('editModal').addEventListener('click', e => {
        if (e.target === document.getElementById('editModal')) closeEditModal();
    });

    document.getElementById('editContent').addEventListener('input', function() {
        document.getElementById('editCharCount').textContent = this.value.length;
    });

    document.getElementById('editIsPublic').addEventListener('change', function() {
        document.getElementById('editToggleLabel').textContent = this.checked ? '🌐 전체 공개' : '🔒 연결된 행성만';
    });

    function toggleLike(btn) {
        const postId = btn.dataset.id;
        fetch('/feed/like/' + postId, { method: 'POST' })
            .then(r => r.json())
            .then(count => {
                btn.classList.toggle('liked');
                btn.querySelector('.like-count').textContent = count;
            });
    }
</script>
<th:block th:replace="~{fragments/bottom-nav :: bottom-nav('feed')}"></th:block>
</body>
</html>
