<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gravity - 우주 대시보드</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

<!-- 상단 네비게이션 -->
<nav class="navbar">
    <div class="nav-logo">🪐 Gravity</div>
    <div class="nav-menu">
        <a th:href="@{/search}" class="nav-link">🔍 궁합 등록</a>
        <a th:href="@{/mypage}" class="nav-user nav-link" style="-webkit-text-fill-color:inherit;">
            <img th:if="${currentUser.profileImage != null}"
                 th:src="@{'/uploads/' + ${currentUser.profileImage}}"
                 class="nav-profile-img" alt="프로필">
            <span th:if="${currentUser.profileImage == null}" class="user-avatar">👤</span>
            <span th:text="${currentUser.name}">이름</span>
        </a>
        <a th:href="@{/auth/logout}" class="nav-link logout">로그아웃</a>
    </div>
</nav>

<!-- 대시보드 메인 -->
<div class="dashboard-container">

    <!-- 궁합 없을 때 안내 -->
    <div th:if="${compatibilities.empty}" class="empty-state">
        <div class="empty-icon">🌌</div>
        <h2>아직 등록된 궁합이 없어요</h2>
        <p>상대방을 검색하고 궁합을 등록해보세요!</p>
        <a th:href="@{/search}" class="btn-primary">궁합 등록하기</a>
    </div>

    <!-- 우주 캔버스 -->
    <div th:if="${!compatibilities.empty}" class="universe-wrapper">
        <canvas id="universeCanvas"></canvas>

        <!-- 중앙 나 표시 -->
        <div class="center-user">
            <div class="center-planet">
                <span class="center-emoji">🌍</span>
            </div>
            <div class="center-label" th:text="${currentUser.name}">나</div>
        </div>

        <!-- 범례 -->
        <div class="legend">
            <div class="legend-title">궤도 기준</div>
            <div class="legend-item"><span class="legend-planet">☿</span> 수성 <span class="legend-score">90점↑</span></div>
            <div class="legend-item"><span class="legend-planet">♀</span> 금성 <span class="legend-score">77점↑</span></div>
            <div class="legend-item"><span class="legend-planet">♂</span> 화성 <span class="legend-score">63점↑</span></div>
            <div class="legend-item"><span class="legend-planet">♃</span> 목성 <span class="legend-score">49점↑</span></div>
            <div class="legend-item"><span class="legend-planet">♄</span> 토성 <span class="legend-score">35점↑</span></div>
            <div class="legend-item"><span class="legend-planet">⛢</span> 천왕성 <span class="legend-score">20점↑</span></div>
            <div class="legend-item"><span class="legend-planet">♆</span> 해왕성 <span class="legend-score">~19점</span></div>
        </div>

        <!-- 줌 컨트롤 -->
        <div class="zoom-controls">
            <button id="zoomIn"    class="zoom-btn">＋</button>
            <button id="zoomReset" class="zoom-btn">⟳</button>
            <button id="zoomOut"   class="zoom-btn">－</button>
        </div>

        <!-- 점수 목록 -->
        <div class="score-list" id="scoreList">
            <div class="drawer-handle" id="drawerToggle">▲ 목록</div>
            <div class="score-list-header" onclick="toggleScoreList()">
                <h3>궁합 목록</h3>
                <button class="score-list-toggle" id="scoreListToggle">∧</button>
            </div>
            <div class="score-list-items">
            <div th:each="c : ${compatibilities}" class="score-item"
                 th:data-id="${c.id}" th:onclick="'showDetail(' + ${c.id} + ')'">
                <div class="score-avatar" th:style="'background:' + ${c.planetColor}">
                    <span th:text="${c.rank + '위'}">순위</span>
                </div>
                <div class="score-info">
                    <div class="score-name" th:text="${c.partnerName}">이름</div>
                    <div class="score-bar-wrap">
                        <div class="score-bar" th:style="'width:' + ${c.score} + '%'"></div>
                    </div>
                </div>
                <div class="score-num" th:text="${c.score} + '점'">0점</div>
            </div>
            </div><!-- score-list-items end -->
        </div>
    </div>
</div>

<!-- 궁합 상세 모달 -->
<div id="detailModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-card" id="modalContent">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-header">
            <div class="modal-planet" id="modalPlanet"></div>
            <div class="modal-title-wrap">
                <h2 id="modalName">이름</h2>
                <span id="modalLabel" class="modal-label">천생연분</span>
            </div>
        </div>
        <div class="modal-score-area">
            <div class="modal-total-score" id="modalScore">0</div>
            <div class="modal-score-sub">종합 궁합 점수</div>
        </div>
        <div class="modal-scores">
            <div class="modal-score-item">
                <span>띠 궁합</span>
                <div class="mini-bar-wrap"><div class="mini-bar" id="zodiacBar"></div></div>
                <span id="zodiacScore">0</span>
            </div>
            <div class="modal-score-item">
                <span>수비학</span>
                <div class="mini-bar-wrap"><div class="mini-bar" id="numerologyBar"></div></div>
                <span id="numerologyScore">0</span>
            </div>
            <div class="modal-score-item">
                <span>오행</span>
                <div class="mini-bar-wrap"><div class="mini-bar" id="elementBar"></div></div>
                <span id="elementScore">0</span>
            </div>
        </div>
        <div class="modal-info-grid">
            <div><span class="info-label">띠</span><span id="modalZodiac">-</span></div>
            <div><span class="info-label">성별</span><span id="modalGender">-</span></div>
            <div><span class="info-label">등록일</span><span id="modalDate">-</span></div>
        </div>
        <div class="modal-analysis">
            <h3>✨ AI 궁합 분석</h3>
            <p id="modalAnalysis">분석 텍스트</p>
        </div>
        <div class="modal-actions">
            <button class="btn-capture" onclick="captureResult()">📸 이미지 저장</button>
            <button class="btn-share" onclick="shareResult()">🔗 공유하기</button>
        </div>
    </div>
</div>

<!-- 토스트 알림 -->
<div id="toast" class="toast"></div>

<!-- html2canvas CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script th:inline="javascript">
    const compatibilities = /*[(${compatibilitiesJson})]*/ [];
    const currentUserName = /*[[${currentUser.name}]]*/ '나';
</script>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
