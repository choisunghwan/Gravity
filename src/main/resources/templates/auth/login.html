<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gravity - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body class="auth-body">
<div class="stars"></div>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">🪐</div>
            <h1 class="logo-title">Gravity</h1>
            <p class="logo-subtitle">서로를 끌어당기는 힘</p>
        </div>

        <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>
        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${logoutMsg}" class="alert alert-info" th:text="${logoutMsg}"></div>

        <form th:action="@{/auth/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">아이디</label>
                <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
            </div>
            <div class="remember-row">
                <label class="remember-label">
                    <input type="checkbox" id="rememberMe"> 아이디 저장
                </label>
            </div>
            <button type="submit" class="btn-primary">로그인</button>
        </form>

        <div class="auth-footer">
            <span>계정이 없으신가요?</span>
            <a th:href="@{/auth/register}">회원가입</a>
        </div>
    </div>

    <!-- 하단 크레딧 -->
    <div class="auth-credit">
        <div class="credit-divider">
            <span class="credit-star">✦</span>
            <span class="credit-star">✦</span>
            <span class="credit-star">✦</span>
        </div>
        <p class="credit-text">Developed by <strong>CSH LAB</strong></p>
        <p class="credit-sub">© 2026 Gravity</p>
    </div>
</div>

<script>
    // 아이디 저장
    const usernameInput = document.getElementById('username');
    const rememberCheck = document.getElementById('rememberMe');
    const saved = localStorage.getItem('savedUsername');
    if (saved) { usernameInput.value = saved; rememberCheck.checked = true; }

    document.querySelector('.auth-form').addEventListener('submit', () => {
        if (rememberCheck.checked) {
            localStorage.setItem('savedUsername', usernameInput.value);
        } else {
            localStorage.removeItem('savedUsername');
        }
    });

    // 별 생성
    const starsEl = document.querySelector('.stars');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.classList.add('star');
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.animationDelay = Math.random() * 3 + 's';
        star.style.animationDuration = (Math.random() * 2 + 2) + 's';
        starsEl.appendChild(star);
    }
</script>
</body>
</html>
