<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="pwa">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#7C3AED">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gravity">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    // 새 SW 설치 완료 시 페이지 자동 새로고침 (구 캐시 즉시 교체)
                    reg.addEventListener('updatefound', () => {
                        const nw = reg.installing;
                        if (!nw) return;
                        nw.addEventListener('statechange', () => {
                            if (nw.state === 'activated') {
                                window.location.reload();
                            }
                        });
                    });
                }).catch(() => {});

                // skipWaiting + clients.claim 으로 SW 교체될 때 리로드
                let _swReloaded = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!_swReloaded) { _swReloaded = true; window.location.reload(); }
                });
            });
        }
    </script>
</head>
</html>
