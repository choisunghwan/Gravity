<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 배경 -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- 별들 -->
  <circle cx="10" cy="12" r="1" fill="white" opacity="0.8"/>
  <circle cx="52" cy="8"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="56" cy="44" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="8"  cy="50" r="1"   fill="white" opacity="0.5"/>
  <circle cx="44" cy="54" r="0.8" fill="white" opacity="0.7"/>

  <!-- 행성 글로우 -->
  <circle cx="32" cy="32" r="20" fill="url(#glow)"/>

  <!-- 궤도 링 -->
  <ellipse cx="32" cy="32" rx="28" ry="10"
           fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"
           transform="rotate(-25 32 32)"/>

  <!-- 행성 본체 -->
  <circle cx="32" cy="32" r="13" fill="url(#planet)"/>

  <!-- 행성 하이라이트 -->
  <circle cx="27" cy="27" r="4" fill="white" opacity="0.15"/>
</svg>
