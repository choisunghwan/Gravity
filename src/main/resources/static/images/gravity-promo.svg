<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- 배경 그라디언트 -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1A0B3B"/>
      <stop offset="100%" stop-color="#030210"/>
    </radialGradient>

    <!-- 태양 글로우 -->
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD040" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FF8C00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FF6000" stop-opacity="0"/>
    </radialGradient>

    <!-- 타이틀 그라디언트 -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>

    <!-- 행성 그라디언트들 -->
    <radialGradient id="earth" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </radialGradient>
    <radialGradient id="planet1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#F9A8C9"/>
    </radialGradient>
    <radialGradient id="planet2" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#7DD3FC"/>
    </radialGradient>
    <radialGradient id="planet3" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </radialGradient>

    <!-- 카드 blur -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1080" height="1080" fill="url(#bgGrad)"/>

  <!-- 별들 -->
  <g fill="white">
    <circle cx="80" cy="60" r="1.2" opacity="0.8"/>
    <circle cx="180" cy="120" r="0.8" opacity="0.6"/>
    <circle cx="320" cy="45" r="1.5" opacity="0.9"/>
    <circle cx="450" cy="90" r="0.9" opacity="0.7"/>
    <circle cx="600" cy="30" r="1.1" opacity="0.8"/>
    <circle cx="720" cy="80" r="0.7" opacity="0.5"/>
    <circle cx="850" cy="50" r="1.3" opacity="0.9"/>
    <circle cx="980" cy="110" r="0.8" opacity="0.6"/>
    <circle cx="1040" cy="40" r="1.0" opacity="0.7"/>
    <circle cx="50" cy="200" r="0.9" opacity="0.6"/>
    <circle cx="150" cy="350" r="1.2" opacity="0.7"/>
    <circle cx="30" cy="500" r="0.8" opacity="0.5"/>
    <circle cx="100" cy="650" r="1.4" opacity="0.8"/>
    <circle cx="60" cy="800" r="0.9" opacity="0.6"/>
    <circle cx="200" cy="920" r="1.1" opacity="0.7"/>
    <circle cx="950" cy="200" r="1.0" opacity="0.6"/>
    <circle cx="1020" cy="380" r="0.8" opacity="0.7"/>
    <circle cx="990" cy="550" r="1.2" opacity="0.5"/>
    <circle cx="1050" cy="700" r="0.9" opacity="0.8"/>
    <circle cx="920" cy="850" r="1.1" opacity="0.6"/>
    <circle cx="380" cy="980" r="0.8" opacity="0.5"/>
    <circle cx="700" cy="1010" r="1.0" opacity="0.7"/>
    <circle cx="250" cy="160" r="0.7" opacity="0.6"/>
    <circle cx="560" cy="140" r="1.0" opacity="0.8"/>
    <circle cx="830" cy="160" r="0.8" opacity="0.5"/>
    <circle cx="480" cy="970" r="1.2" opacity="0.6"/>
    <circle cx="900" cy="960" r="0.9" opacity="0.7"/>
  </g>

  <!-- 태양 (우측 상단) -->
  <circle cx="920" cy="130" r="120" fill="url(#sunGlow)"/>
  <circle cx="920" cy="130" r="38" fill="#FFD040" opacity="0.25"/>
  <circle cx="920" cy="130" r="22" fill="#FFE060" opacity="0.45"/>
  <circle cx="912" cy="122" r="10" fill="#FFF4A0" opacity="0.6"/>
  <text x="920" y="172" font-family="sans-serif" font-size="13" fill="#FFD040" opacity="0.5" text-anchor="middle">태양</text>

  <!-- 궤도 링 (중심: 540, 570) -->
  <g stroke="white" fill="none" stroke-dasharray="4 10">
    <circle cx="540" cy="570" r="120" stroke-opacity="0.12"/>
    <circle cx="540" cy="570" r="190" stroke-opacity="0.10"/>
    <circle cx="540" cy="570" r="270" stroke-opacity="0.08"/>
    <circle cx="540" cy="570" r="360" stroke-opacity="0.06"/>
  </g>

  <!-- 궤도 라벨 -->
  <g font-family="'Noto Sans KR', sans-serif" font-size="11" fill="white" opacity="0.3">
    <text x="650" y="462">수성 궤도</text>
    <text x="710" y="392">금성 궤도</text>
    <text x="780" y="312">화성 궤도</text>
    <text x="860" y="222">목성 궤도</text>
  </g>

  <!-- 지구 (나) -->
  <circle cx="540" cy="570" r="45" fill="url(#earth)" filter="url(#glow)"/>
  <circle cx="540" cy="570" r="45" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.4"/>
  <text x="540" y="576" font-family="sans-serif" font-size="22" fill="white" text-anchor="middle" dominant-baseline="middle">🌍</text>
  <text x="540" y="628" font-family="'Noto Sans KR', sans-serif" font-size="13" fill="white" text-anchor="middle" opacity="0.9" font-weight="600">나</text>

  <!-- 궁합 행성 1 (여자, 수성 궤도) -->
  <circle cx="618" cy="458" r="32" fill="url(#planet1)" filter="url(#glow)"/>
  <text x="618" y="463" font-family="sans-serif" font-size="16" fill="#BE185D" text-anchor="middle" dominant-baseline="middle" font-weight="bold">♀</text>
  <text x="618" y="500" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#F9A8C9" text-anchor="middle" opacity="0.85">서연 · 95점</text>

  <!-- 궁합 행성 2 (남자, 금성 궤도) -->
  <circle cx="700" cy="405" r="26" fill="url(#planet2)" filter="url(#glow)"/>
  <text x="700" y="410" font-family="sans-serif" font-size="14" fill="#0369A1" text-anchor="middle" dominant-baseline="middle" font-weight="bold">♂</text>
  <text x="700" y="440" font-family="'Noto Sans KR', sans-serif" font-size="11" fill="#7DD3FC" text-anchor="middle" opacity="0.85">민준 · 82점</text>

  <!-- 궁합 행성 3 (여자, 화성 궤도) -->
  <circle cx="405" cy="330" r="22" fill="url(#planet3)" filter="url(#glow)"/>
  <text x="405" y="335" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" dominant-baseline="middle" opacity="0.8" font-weight="bold">♀</text>
  <text x="405" y="362" font-family="'Noto Sans KR', sans-serif" font-size="10" fill="#C084FC" text-anchor="middle" opacity="0.75">67점</text>

  <!-- 연결선 (지구↔행성1) -->
  <line x1="540" y1="525" x2="618" y2="490" stroke="url(#titleGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="4 6"/>

  <!-- 메인 타이틀 영역 -->
  <!-- 배경 글로우 -->
  <ellipse cx="540" cy="200" rx="350" ry="120" fill="#7C3AED" opacity="0.08"/>

  <!-- 🪐 아이콘 -->
  <text x="540" y="110" font-family="sans-serif" font-size="62" text-anchor="middle" dominant-baseline="middle">🪐</text>

  <!-- GRAVITY 타이틀 -->
  <text x="540" y="195" font-family="'Arial Black', 'Noto Sans KR', sans-serif"
        font-size="82" font-weight="900" text-anchor="middle"
        fill="url(#titleGrad)" letter-spacing="12">GRAVITY</text>

  <!-- 서브타이틀 -->
  <text x="540" y="248" font-family="'Noto Sans KR', sans-serif"
        font-size="20" text-anchor="middle" fill="white" opacity="0.65" letter-spacing="4">
    별자리가 이어주는 인연
  </text>

  <!-- 구분선 -->
  <line x1="380" y1="272" x2="700" y2="272" stroke="white" stroke-width="0.5" opacity="0.2"/>

  <!-- 피처 카드들 -->
  <!-- 카드 1 -->
  <rect x="82" y="820" width="270" height="110" rx="16" fill="white" fill-opacity="0.05"
        stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="105" y="855" font-family="sans-serif" font-size="24">🔮</text>
  <text x="138" y="856" font-family="'Noto Sans KR', sans-serif" font-size="15" font-weight="700" fill="white">AI 궁합 분석</text>
  <text x="105" y="882" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" opacity="0.55">띠 · 수비학 · 오행 3가지</text>
  <text x="105" y="902" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" opacity="0.55">요소로 정밀 분석</text>

  <!-- 카드 2 -->
  <rect x="405" y="820" width="270" height="110" rx="16" fill="white" fill-opacity="0.05"
        stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="428" y="855" font-family="sans-serif" font-size="24">🌌</text>
  <text x="461" y="856" font-family="'Noto Sans KR', sans-serif" font-size="15" font-weight="700" fill="white">우주 대시보드</text>
  <text x="428" y="882" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" opacity="0.55">점수에 따라 수성~해왕성</text>
  <text x="428" y="902" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" opacity="0.55">궤도에 행성으로 표현</text>

  <!-- 카드 3 -->
  <rect x="728" y="820" width="270" height="110" rx="16" fill="white" fill-opacity="0.05"
        stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <text x="751" y="855" font-family="sans-serif" font-size="24">💫</text>
  <text x="784" y="856" font-family="'Noto Sans KR', sans-serif" font-size="15" font-weight="700" fill="white">990원 결제</text>
  <text x="751" y="882" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" opacity="0.55">토스페이먼츠 연동</text>
  <text x="751" y="902" font-family="'Noto Sans KR', sans-serif" font-size="12" fill="white" opacity="0.55">최초 2회 무료 제공</text>

  <!-- 하단 크레딧 -->
  <text x="540" y="970" font-family="'Arial', sans-serif" font-size="13"
        text-anchor="middle" fill="white" opacity="0.3" letter-spacing="3">
    Developed by CSH LAB
  </text>
  <text x="540" y="992" font-family="'Arial', sans-serif" font-size="11"
        text-anchor="middle" fill="white" opacity="0.18" letter-spacing="1">
    © 2026 Gravity
  </text>

  <!-- 별똥별 효과 -->
  <line x1="200" y1="80" x2="270" y2="130" stroke="white" stroke-width="1.5" opacity="0.4"
        stroke-linecap="round"/>
  <circle cx="200" cy="80" r="2" fill="white" opacity="0.6"/>

  <line x1="750" y1="920" x2="810" y2="960" stroke="white" stroke-width="1" opacity="0.3"
        stroke-linecap="round"/>
  <circle cx="750" cy="920" r="1.5" fill="white" opacity="0.5"/>
</svg>
