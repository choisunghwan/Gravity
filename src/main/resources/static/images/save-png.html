<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gravity 이미지 저장</title>
  <style>
    body { background: #111; display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100vh; gap: 20px; font-family: sans-serif; }
    img { width: 540px; height: 540px; border-radius: 16px; }
    button { background: linear-gradient(135deg, #7C3AED, #EC4899); color: white;
             border: none; padding: 14px 36px; border-radius: 12px; font-size: 16px;
             cursor: pointer; font-weight: 600; }
    button:hover { opacity: 0.9; }
    p { color: #94A3B8; font-size: 13px; }
  </style>
</head>
<body>
  <img id="preview" src="gravity-promo.svg" alt="Gravity 홍보 이미지">
  <button onclick="downloadPNG()">📥 PNG 다운로드</button>
  <p>버튼을 누르면 gravity-promo.png 로 저장됩니다</p>

  <script>
    function downloadPNG() {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function() {
        const canvas = document.createElement('canvas');
        canvas.width = 1080;
        canvas.height = 1080;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 1080, 1080);
        const link = document.createElement('a');
        link.download = 'gravity-promo.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };
      img.src = 'gravity-promo.svg?' + Date.now();
    }
  </script>
</body>
</html>
