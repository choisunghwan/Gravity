<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#050510"/>
  <circle cx="256" cy="256" r="190" fill="#0D0B2B"/>
  <!-- 배경 별들 -->
  <circle cx="100" cy="110" r="3" fill="white" opacity="0.7"/>
  <circle cx="400" cy="140" r="2" fill="white" opacity="0.5"/>
  <circle cx="130" cy="390" r="2.5" fill="white" opacity="0.6"/>
  <circle cx="420" cy="360" r="3" fill="white" opacity="0.7"/>
  <circle cx="80" cy="280" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="440" cy="220" r="2" fill="white" opacity="0.5"/>
  <circle cx="320" cy="80" r="2" fill="white" opacity="0.6"/>
  <!-- 궤도 링 -->
  <ellipse cx="256" cy="270" rx="160" ry="40" fill="none" stroke="#A78BFA" stroke-width="10" opacity="0.4" transform="rotate(-15, 256, 270)"/>
  <!-- 행성 그라데이션 -->
  <defs>
    <radialGradient id="pg" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 글로우 -->
  <circle cx="256" cy="256" r="110" fill="url(#glow)"/>
  <!-- 행성 본체 -->
  <circle cx="256" cy="256" r="78" fill="url(#pg)"/>
  <!-- 행성 하이라이트 -->
  <circle cx="230" cy="228" r="22" fill="white" opacity="0.12"/>
  <!-- 링 앞부분 -->
  <ellipse cx="256" cy="270" rx="160" ry="40" fill="none" stroke="#C4B5FD" stroke-width="6" opacity="0.6" transform="rotate(-15, 256, 270)" stroke-dasharray="260 260" stroke-dashoffset="0"/>
  <!-- G 텍스트 -->
  <text x="256" y="272" font-family="Arial, sans-serif" font-size="72" font-weight="900" text-anchor="middle" dominant-baseline="middle" fill="white" opacity="0.9">G</text>
</svg>
