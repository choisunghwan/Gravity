<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0D0B2B"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="planet" cx="38%" cy="32%">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B0764"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F0ABFC" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#E879F9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C026D3" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#DDD6FE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0.5"/>
    </linearGradient>
    <clipPath id="upper"><rect x="0" y="0" width="512" height="248"/></clipPath>
    <clipPath id="lower"><rect x="0" y="248" width="512" height="264"/></clipPath>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- 별들 -->
  <circle cx="80"  cy="90"  r="2.5" fill="white" opacity="0.8"/>
  <circle cx="420" cy="70"  r="1.5" fill="white" opacity="0.6"/>
  <circle cx="440" cy="180" r="2"   fill="white" opacity="0.7"/>
  <circle cx="70"  cy="350" r="2"   fill="white" opacity="0.5"/>
  <circle cx="460" cy="400" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="130" cy="430" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="380" cy="450" r="2"   fill="white" opacity="0.5"/>
  <circle cx="310" cy="60"  r="1.5" fill="white" opacity="0.7"/>
  <circle cx="160" cy="120" r="1"   fill="white" opacity="0.4"/>
  <circle cx="400" cy="320" r="1"   fill="white" opacity="0.4"/>

  <!-- 링 뒷면 (행성 뒤) -->
  <ellipse cx="256" cy="268" rx="178" ry="44"
           fill="none" stroke="url(#ring2)" stroke-width="14"
           transform="rotate(-18, 256, 268)"
           clip-path="url(#upper)"/>
  <ellipse cx="256" cy="268" rx="155" ry="34"
           fill="none" stroke="#7C3AED" stroke-width="8" stroke-opacity="0.3"
           transform="rotate(-18, 256, 268)"
           clip-path="url(#upper)"/>

  <!-- 행성 글로우 -->
  <circle cx="256" cy="256" r="130" fill="url(#glow)"/>

  <!-- 행성 본체 -->
  <circle cx="256" cy="256" r="100" fill="url(#planet)"/>

  <!-- 행성 표면 줄무늬 -->
  <ellipse cx="256" cy="230" rx="98" ry="18" fill="#9333EA" opacity="0.35"/>
  <ellipse cx="256" cy="270" rx="98" ry="14" fill="#6D28D9" opacity="0.3"/>

  <!-- 행성 하이라이트 -->
  <ellipse cx="220" cy="210" rx="38" ry="24" fill="white" opacity="0.1"/>

  <!-- 링 앞면 (행성 앞) -->
  <ellipse cx="256" cy="268" rx="178" ry="44"
           fill="none" stroke="url(#ring1)" stroke-width="14"
           transform="rotate(-18, 256, 268)"
           clip-path="url(#lower)"/>
  <ellipse cx="256" cy="268" rx="155" ry="34"
           fill="none" stroke="#F0ABFC" stroke-width="5" stroke-opacity="0.4"
           transform="rotate(-18, 256, 268)"
           clip-path="url(#lower)"/>
</svg>
